{% if not log %}
<div class="text-gray-600 text-xs py-6 text-center">No agent activity yet. Enable the agent to start fixing PRs.</div>
{% else %}
<div class="space-y-0.5 font-mono text-[11px]">
    {% for entry in log | reverse %}
    <div class="flex gap-2 py-0.5 px-1 rounded hover:bg-white/5">
        <span class="text-gray-600 shrink-0 tabular-nums">{{ entry.timestamp.strftime('%H:%M:%S') }}</span>
        <span class="text-purple-400/70 shrink-0 w-40 truncate" title="{{ entry.pr_key }}">{{ entry.pr_key }}</span>
        <span class="{% if entry.message.startswith('[') %}text-blue-400{% elif 'fail' in entry.message.lower() or 'error' in entry.message.lower() %}text-red-400{% elif 'succeed' in entry.message.lower() or 'fixed' in entry.message.lower() %}text-green-400{% else %}text-gray-400{% endif %} break-all">{{ entry.message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
