{% if not log %}
<div class="te-faint text-xs py-6 text-center">// no agent activity yet</div>
{% else %}
<div class="space-y-0.5 text-[11px]" id="global-log-entries">
    {% for entry in log | reverse %}
    <div class="flex gap-2 py-0.5 px-1 hover-bg-elevated log-entry" data-pr="{{ entry.pr_key }}">
        <span class="te-faint shrink-0 tabular-nums">{{ entry.timestamp.strftime('%H:%M:%S') }}</span>
        <span class="te-purple shrink-0 whitespace-nowrap cursor-pointer hover:text-accent select-none log-pr-filter"
            onclick="window._toggleLogFilter('{{ entry.pr_key }}')">{{ entry.pr_key }}</span>
        <span class="{% if entry.message.startswith('[') %}te-info{% elif 'fail' in entry.message.lower() or 'error' in entry.message.lower() %}te-error{% elif 'succeed' in entry.message.lower() or 'fixed' in entry.message.lower() %}te-success{% else %}te-secondary{% endif %} break-all">{{ entry.message }}</span>
    </div>
    {% endfor %}
</div>
<script>
window._logFilterKey = window._logFilterKey || null;
window._toggleLogFilter = function(key) {
    window._logFilterKey = window._logFilterKey === key ? null : key;
    document.querySelectorAll('#global-log-entries .log-entry').forEach(el => {
        el.style.display = (!window._logFilterKey || el.dataset.pr === window._logFilterKey) ? '' : 'none';
    });
    document.querySelectorAll('#global-log-entries .log-pr-filter').forEach(el => {
        if (window._logFilterKey && el.textContent.trim() === window._logFilterKey) {
            el.classList.add('text-accent', 'underline');
        } else {
            el.classList.remove('text-accent', 'underline');
        }
    });
};
if (window._logFilterKey) { setTimeout(() => window._toggleLogFilter(window._logFilterKey), 50); }
</script>
{% endif %}
