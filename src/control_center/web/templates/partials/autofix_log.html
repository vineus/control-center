{% if not log %}
<div class="te-faint text-xs py-4 text-center">// no log entries yet</div>
{% else %}
<div class="space-y-0.5 text-[11px]">
    {% for entry in log %}
    <div class="flex gap-2 py-0.5">
        <span class="te-faint shrink-0 tabular-nums">{{ entry.timestamp.strftime('%H:%M:%S') }}</span>
        <span class="{% if entry.message.startswith('[') %}te-info{% else %}te-secondary{% endif %} break-all">{{ entry.message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
